name: CI

on:
  push:
    branches: [main, preview, task-linking]
  pull_request:
    branches: [main, preview]

jobs:
  ci:
    name: Type check & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --run
